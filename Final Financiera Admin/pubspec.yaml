name: financiera_admin
description: App movil de asesores de campo - Santander Consumer Peru.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.6.0
  sqflite: ^2.3.0
  path_provider: ^2.1.5
  path: ^1.9.0
  geolocator: ^14.0.2
  google_maps_flutter: ^2.17.0
  camera: ^0.11.0+2
  image_picker: ^1.2.2
  pdf: ^3.10.8
  qr_flutter: ^4.1.0
  fl_chart: ^0.68.0
  flutter_riverpod: ^2.6.1
  http: ^1.2.2
  url_launcher: ^6.3.1
  shared_preferences: ^2.2.0
  uuid: ^4.3.3
  connectivity_plus: ^7.1.1
  google_fonts: ^8.1.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/santander_icon.png
  adaptive_icon_background: "#EC0000"
  adaptive_icon_foreground: assets/branding/santander_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/branding/santander_icon.png
    - assets/branding/santander_logo.png
